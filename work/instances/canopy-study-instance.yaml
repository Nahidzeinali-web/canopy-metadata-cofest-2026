  Acknowledgment Statement:
    value: This is a fully synthetic dataset and protocol generated for the ISMB/ECCB CollaborationFest 2026 Canopy metadata-generation project. No human subjects were enrolled and no real data are reported.
  Study Description:
    value: A two-arm, parallel-group, randomized pilot trial (protocol SPbE-2026, v1.0) evaluating the effect of a 10-hour time-restricted eating (TRE) window, relative to a habitual eating schedule, on glycemic control in adults aged 40–65 with prediabetes. Forty participants were enrolled across four sites (United States, Germany, Spain, Canada) and randomized 1:1, stratified by site and sex, and followed for 12 weeks. The primary endpoint is change in fasting plasma glucose from baseline to week 12; secondary endpoints include change in HbA1c, body weight/BMI, and systolic blood pressure, plus adherence and safety. As a pilot, the study is not powered for confirmatory inference. This is a fully synthetic dataset with fabricated subjects and results, created for the ISMB/ECCB CollaborationFest 2026 AI-assisted metadata generation project.
